services:
  postgres:
    image: postgres:16-alpine
    container_name: finza-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: finza
      POSTGRES_PASSWORD: finza_secret
      POSTGRES_DB: finza
    ports:
      - "5432:5432"
    volumes:
      - finza_pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finza -d finza"]
      interval: 10s
      timeout: 5s
      retries: 5
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: finza-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  finza_pgdata:
    driver: local