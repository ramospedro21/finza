services:
  postgres:
    image: postgres:16-alpine
    container_name: finza-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finza}
      POSTGRES_DB: ${POSTGRES_DB:-finza}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - finza_pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finza} -d ${POSTGRES_DB:-finza}"]
      interval: 10s
      timeout: 5s
      retries: 5
  evolution-api:
    container_name: evolution_api
    image: atendai/evolution-api:v1.8.2
    restart: always
    ports:
      - "8080:8080"
    environment:
      AUTHENTICATION_API_KEY: B6D711FCDE4D4FD5936544120E713976
      SERVER_URL: http://localhost:8080
      DEL_INSTANCE: "false"
      DATABASE_ENABLED: "false"
      QRCODE_LIMIT: "30"
    volumes:
      - evolution_instances:/evolution/instances

volumes:
  finza_pgdata:
    driver: local
  evolution_instances:
    driver: local